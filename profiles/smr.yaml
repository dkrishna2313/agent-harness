research_gap_checks:
  licensing:
    - topic: "NRC Licensing Path"
      keywords: ["nrc", "design certification", "dc application", "licensing path", "10 cfr"]
      priority: high
      description: "No NRC licensing pathway or design certification status found."
      rationale: "NRC licensing timeline is typically 3-7 years and is the critical path for deployment."
    - topic: "Construction Permit"
      keywords: ["construction permit", "cp application", "combined license", "col"]
      priority: high
      description: "No construction permit or combined license information found."
      rationale: "Construction permit must precede site preparation and equipment orders."
    - topic: "Operating License"
      keywords: ["operating license", "ol ", "commercial operation", "first criticality"]
      priority: medium
      description: "No operating license timeline found."
      rationale: "Operating license completion marks the start of commercial operation."
    - topic: "Regulatory Timeline"
      keywords: ["regulatory timeline", "review period", "licensing schedule", "regulatory approval"]
      priority: medium
      description: "No regulatory timeline or approval schedule found."
      rationale: "Regulatory timeline uncertainty is a primary deployment risk factor."
  economics:
    - topic: "Overnight Capital Cost"
      keywords: ["overnight capital", "capital cost", "$/kw", "dollar per kilowatt", "capex"]
      priority: high
      description: "No overnight capital cost estimate found."
      rationale: "Capital cost per kW is the primary economic comparator for SMR deployment decisions."
    - topic: "Levelized Cost of Electricity"
      keywords: ["lcoe", "levelized cost", "cost of electricity", "$/mwh", "cents per kwh"]
      priority: high
      description: "No levelized cost of electricity (LCOE) estimate found."
      rationale: "LCOE determines economic competitiveness against alternative generation sources."
    - topic: "Financing Model"
      keywords: ["financing", "debt", "equity", "ppa", "power purchase", "government support", "loan guarantee"]
      priority: medium
      description: "No financing model or structure found."
      rationale: "Financing structure significantly affects project economics and risk allocation."
    - topic: "Cost Overrun Risk"
      keywords: ["cost overrun", "contingency", "schedule risk", "first of a kind", "nth of a kind"]
      priority: medium
      description: "No cost overrun risk assessment found."
      rationale: "First-of-a-kind projects historically face 50-200% cost overruns."
  fuel cycle:
    - topic: "Fuel Availability"
      keywords: ["fuel availability", "fuel supply", "uranium supply", "fuel procurement"]
      priority: high
      description: "No fuel availability or supply chain analysis found."
      rationale: "Fuel supply chain must be secured before commercial operation."
    - topic: "HALEU Supply"
      keywords: ["haleu", "high-assay low-enriched", "enrichment capacity", "centrus", "urenco"]
      priority: high
      description: "No HALEU (High-Assay Low-Enriched Uranium) supply analysis found."
      rationale: "Many SMR designs require HALEU which has limited current supply capacity."
    - topic: "Enrichment"
      keywords: ["enrichment", "enriched uranium", "enrichment facility", "swu"]
      priority: medium
      description: "No uranium enrichment pathway found."
      rationale: "Enrichment capacity determines fuel lead times and costs."
    - topic: "Refueling Interval"
      keywords: ["refueling", "refuel interval", "core life", "fuel cycle length", "outage"]
      priority: medium
      description: "No refueling interval or schedule found."
      rationale: "Refueling interval affects capacity factor and operational planning."
  waste management:
    - topic: "Spent Fuel Handling"
      keywords: ["spent fuel", "used fuel", "sfp", "spent fuel pool", "fuel handling"]
      priority: high
      description: "No spent fuel handling or storage plan found."
      rationale: "On-site spent fuel management is required from first reload."
    - topic: "Interim Storage"
      keywords: ["interim storage", "dry cask", "issi", "independent spent fuel storage"]
      priority: medium
      description: "No interim spent fuel storage plan found."
      rationale: "Interim storage is required given lack of final repository."
    - topic: "Disposal Pathway"
      keywords: ["disposal", "repository", "yucca mountain", "final disposal", "permanent storage"]
      priority: medium
      description: "No final waste disposal pathway identified."
      rationale: "Final disposal pathway remains unresolved for the US nuclear industry."
  grid integration:
    - topic: "Interconnection Requirements"
      keywords: ["interconnection", "grid connection", "transmission", "pcc", "point of common coupling"]
      priority: high
      description: "No grid interconnection requirements found."
      rationale: "Transmission interconnection queue timelines can add 5-10 years to project timeline."
    - topic: "Load Following"
      keywords: ["load following", "dispatchable", "ramping", "flexible operation", "baseload"]
      priority: medium
      description: "No load-following or dispatch capability assessment found."
      rationale: "Load-following capability affects market value in variable-renewable-heavy grids."
    - topic: "Transmission Constraints"
      keywords: ["transmission constraint", "congestion", "curtailment", "transmission capacity"]
      priority: medium
      description: "No transmission constraint analysis found."
      rationale: "Transmission constraints can significantly reduce realized capacity factor."
    - topic: "Capacity Factor"
      keywords: ["capacity factor", "availability factor", "planned outage", "unplanned outage"]
      priority: medium
      description: "No capacity factor or availability estimate found."
      rationale: "Capacity factor is a primary driver of LCOE and revenue projections."
  cooling:
    - topic: "Water Requirements"
      keywords: ["water withdrawal", "water consumption", "makeup water", "cooling water", "gal/mwh"]
      priority: high
      description: "No cooling water requirements found."
      rationale: "Water availability can be a site-limiting constraint for SMR deployment."
    - topic: "Heat Rejection"
      keywords: ["heat rejection", "waste heat", "thermal discharge", "condenser duty"]
      priority: medium
      description: "No heat rejection or thermal discharge specification found."
      rationale: "Thermal discharge requirements affect site selection and environmental permitting."
    - topic: "Cooling Technology"
      keywords: ["cooling tower", "once-through", "dry cooling", "hybrid cooling", "air-cooled condenser"]
      priority: medium
      description: "No cooling technology selection found."
      rationale: "Cooling technology choice affects water use, efficiency, and site suitability."
  reactor design: []
  safety: []
  construction: []
  deployment timeline: []

