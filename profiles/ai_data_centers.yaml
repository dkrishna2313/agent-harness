metric_patterns:
  gpu_count:
    - "\\bhow many\\s+(?:b200s?|gpus?|accelerators?)\\b"
    - "\\b(?:number|count)\\s+of\\s+(?:gpus?|accelerators?)\\b"
    - "\\bgpus?\\s+(?:integrated|installed|in|per|count)\\b"
  rack_power:
    - "\\brack\\s+power\\b"
    - "\\bpower\\s+(?:consumption|requirement|draw|demand|budget)\\b"
    - "\\btotal\\s+power\\b"
    - "\\bhow\\s+much\\s+power\\b"
    - "\\bwatt[s]?\\b|\\bkilo?watt[s]?\\b|\\bkw\\b"
  cooling_capacity:
    - "\\bcooling\\s+(?:capacity|requirement|infrastructure)\\b"
    - "\\bwhy.+(?:liquid|water)\\s+cool"
    - "\\bhow\\s+(?:is|does).+cool\\b"
  memory_capacity:
    - "\\b(?:gpu\\s+)?memory\\s+(?:capacity|size|bandwidth|per)\\b"
    - "\\bhbm\\b"
  network_bandwidth:
    - "\\bbandwidth\\b"
    - "\\bnvlink\\b|\\binfiniband\\b"

