contradiction_id: CONTRA_005
domain: smr
expected_result: no_contradiction
severity: null
category: milestone_progression

claim_a: >
  BWRX-300 construction approval and site preparation licence was granted in 2024.

claim_b: >
  BWRX-300 commercial operation at Darlington is targeted for the early 2030s.

entity: BWRX-300
scope_a: unit
scope_b: unit
metric_a: construction_approval
metric_b: commercial_operation

why_no_contradiction: >
  These claims describe different lifecycle milestones of the same project.
  Construction approval (2024) and commercial operation (2030s) are sequential
  phases of a nuclear project — they are expected to be separated by years.
  The gap between approval and operation is not a contradiction; it is the
  normal project lifecycle.  Only claims about the SAME milestone that differ
  would constitute a contradiction.

suppression_should_fire: true
expected_suppression_reason: milestone_progression

notes: >
  J1.6.5 lifecycle milestone regression test.  The detection engine must
  classify 2024 as "construction_approval" and the 2030s as "commercial_operation"
  and suppress the comparison as a milestone_progression rather than a
  numeric year conflict.
